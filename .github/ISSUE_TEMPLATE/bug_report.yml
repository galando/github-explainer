name: Bug Report
description: Report a bug to help us improve
title: "[Bug]: "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is
      placeholder: "When I try to explain a repo, the page shows an error..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this behavior?
      placeholder: |
        1. Go to '...'
        2. Enter '...'
        3. Click '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: "The repo should be explained with architecture diagram..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: "Error message appeared: 'Failed to fetch...'"
    validations:
      required: true

  - type: input
    id: repo
    attributes:
      label: Repository URL (if applicable)
      description: Which GitHub repo were you trying to explain?
      placeholder: "github.com/owner/repo"

  - type: textarea
    id: logs
    attributes:
      label: Screenshots / Logs
      description: Add any relevant screenshots or console logs
      placeholder: "Paste console output or drag screenshots here"

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Browser Version
      placeholder: "Chrome 120.0.6099.109"

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: I have provided all the required information above
          required: true
