name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-functions:
    name: Deploy Supabase Edge Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.20.5

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy explain-code --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy github-auth --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy github-proxy --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy badge --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # Vercel deployment is automatic via GitHub integration
  # Connect your repo at https://vercel.com/new
