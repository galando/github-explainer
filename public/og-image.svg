<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4ff"/>
      <stop offset="50%" style="stop-color:#e8eeff"/>
      <stop offset="100%" style="stop-color:#f5f3ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1100" cy="80" r="200" fill="#6366f1" opacity="0.06"/>
  <circle cx="100" cy="550" r="150" fill="#8b5cf6" opacity="0.06"/>
  <circle cx="600" cy="-50" r="180" fill="#6366f1" opacity="0.04"/>

  <!-- Card -->
  <rect x="80" y="80" width="1040" height="470" rx="24" fill="white" opacity="0.85"/>

  <!-- Top accent bar -->
  <rect x="80" y="80" width="1040" height="6" rx="3" fill="url(#accent)"/>

  <!-- Icon -->
  <rect x="120" y="150" width="80" height="80" rx="16" fill="url(#accent)"/>
  <text x="160" y="205" font-size="44" text-anchor="middle" fill="white">🔍</text>

  <!-- Title -->
  <text x="230" y="185" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="52" font-weight="700" fill="#111827">
    GitHub Explainer
  </text>
  <text x="230" y="225" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="26" fill="#6366f1" font-weight="600">
    Understand Any GitHub Repo in Seconds
  </text>

  <!-- Divider -->
  <rect x="120" y="265" width="960" height="1" fill="#e5e7eb"/>

  <!-- Feature pills -->
  <rect x="120" y="295" width="220" height="44" rx="22" fill="#eef2ff"/>
  <text x="230" y="323" font-family="sans-serif" font-size="18" fill="#6366f1" text-anchor="middle" font-weight="500">⚡ Instant Analysis</text>

  <rect x="360" y="295" width="210" height="44" rx="22" fill="#eef2ff"/>
  <text x="465" y="323" font-family="sans-serif" font-size="18" fill="#6366f1" text-anchor="middle" font-weight="500">🤖 AI Explanations</text>

  <rect x="590" y="295" width="200" height="44" rx="22" fill="#eef2ff"/>
  <text x="690" y="323" font-family="sans-serif" font-size="18" fill="#6366f1" text-anchor="middle" font-weight="500">🏗 Architecture</text>

  <rect x="810" y="295" width="190" height="44" rx="22" fill="#eef2ff"/>
  <text x="905" y="323" font-family="sans-serif" font-size="18" fill="#6366f1" text-anchor="middle" font-weight="500">⭐ Tech Stack</text>

  <!-- Description -->
  <text x="120" y="410" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" fill="#374151" font-weight="400">
    Paste any GitHub URL. Get AI-powered analysis of architecture,
  </text>
  <text x="120" y="450" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" fill="#374151" font-weight="400">
    tech stack, entry points, and code flow.
  </text>

  <!-- Powered by badge -->
  <text x="120" y="510" font-family="sans-serif" font-size="18" fill="#9ca3af">
    Powered by Groq + Llama 3.3
  </text>
</svg>
